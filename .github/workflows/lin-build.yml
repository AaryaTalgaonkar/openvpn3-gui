name: Linux IITDelhiVPN GUI

on:
  workflow_dispatch:

jobs:
  build-linux-native:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:

          - name: Ubuntu 22.04 amd64
            runner: ubuntu-22.04
            qt_arch: linux_gcc_64
            qt_version: 6.10.1
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++

          - name: Ubuntu 24.04 amd64
            runner: ubuntu-24.04
            qt_arch: linux_gcc_64
            qt_version: 6.10.1
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++

          - name: Ubuntu 24.04 arm64
            runner: ubuntu-24.04-arm
            qt_arch: linux_gcc_arm64
            qt_version: 6.10.1
            build_type: Release
            c_compiler: gcc
            cpp_compiler: g++
    steps:
    - uses: actions/checkout@v7

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        aqtversion: '==3.3.*'
        version: ${{ matrix.qt_version }}
        target: desktop
        arch: ${{ matrix.qt_arch }}


    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
    
    - name: Install LinuxDeploy
      id: install-linuxdeploy
      uses: miurahr/install-linuxdeploy-action@v1.8.0
      with:
        dir: ${{ github.workspace }}
        plugins: qt 

    - name: Run LinuxDeploy
      shell: bash
      env:
        EXTRA_PLATFORM_PLUGINS: "libqwayland.so;libqxcb.so"
        EXTRA_QT_MODULES: "libQt6WaylandClient.so"
      run: |
        TOOL_DIR="${{ github.workspace }}"
        APPDIR="${{ steps.strings.outputs.build-output-dir }}"
        ARCH_SUFFIX=$(uname -m)
        
        LINUXDEPLOY_BIN="$TOOL_DIR/linuxdeploy-$ARCH_SUFFIX.AppImage"
        
        $LINUXDEPLOY_BIN --appdir "$APPDIR" \
          -d "${{ github.workspace }}/deploy/iitdelhivpn.desktop" \
          -i "${{ github.workspace }}/resources/img/iitdelhivpn.png" \
          -e "$APPDIR/IITDelhiVPN" \
          ---plugin qt

    - name: Filter system libraries, docs and translations
      shell: bash
      run: |
        BUILD_DIR="${{ steps.strings.outputs.build-output-dir }}"
        APPDIR="$BUILD_DIR/usr"
    
        echo "Removing Qt and system translations..."
        rm -rf "$APPDIR/translations"
        rm -rf "$APPDIR/share/locale"

        echo "Filtering libraries in $APPDIR/lib..."
        for lib in "$APPDIR/lib"/*.so*; do
          [ -e "$lib" ] || continue
          base=$(basename "$lib")
          if ldconfig -p | grep -q "$base"; then
            echo "SYSTEM LIBRARY: $base → removing"
            rm -f "$lib"
          else
            echo "BUNDLE: $base"
          fi
        done
    
        echo "Filtering documentation in $APPDIR/share/doc..."
        for doc in "$APPDIR/share/doc"/*; do
          [ -e "$doc" ] || continue
          name=$(basename "$doc")
          if [ -e "/usr/share/doc/$name" ]; then
            echo "SYSTEM DOC: $name → removing"
            rm -rf "$doc"
          else
            echo "BUNDLE DOC: $name"
          fi
        done         


    - name: Create tarball
      shell: bash
      run: |
        BUILD_DIR="${{ steps.strings.outputs.build-output-dir }}"
        ARCHIVE_NAME="iitdvpn-gui-lin-${{ matrix.runner }}.tar"

        tar -cvf "$ARCHIVE_NAME" -C "$BUILD_DIR" usr
          
    - name: Upload tarball artifact
      uses: actions/upload-artifact@v7
      with:
        name: iitdvpn-gui-lin-${{ matrix.runner }}
        path: iitdvpn-gui-lin-${{ matrix.runner }}.tar
        if-no-files-found: error
